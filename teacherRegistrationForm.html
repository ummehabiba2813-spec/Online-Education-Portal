    <div class="form-container">
        <h2>Teacher Registration</h2>
        <form id="teacher-form" enctype="multipart/form-data">
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            <div class="input-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>
            </div>
            <div class="input-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="input-group">
                <label for="graduation">Graduation</label>
                <input type="text" id="graduation" name="graduation" required>
            </div>
            <div class="input-group">
                <label for="specialization">Specialization</label>
                <input type="text" id="specialization" name="specialization" required>
            </div>
            <div class="input-group">
                <label for="experience">Experience</label>
                <input type="text" id="experience" name="experience" required>
            </div>
            <div class="input-group">
                <label for="profile-pic">Profile Picture</label>
                <input type="file" id="profile-pic" name="profile-pic" accept="image/*" required>
            </div>
            <div class="input-group">
                <label for="degree-file">Latest Degree</label>
                <input type="file" id="degree-file" name="degree-file" accept=".pdf,.doc,.docx" required>
            </div>
            <div class="input-group">
                <label for="certificate-file">Certificate File</label>
                <input type="file" id="certificate-file" name="certificate-file" accept=".pdf,.doc,.docx">
            </div>
            <div class="input-group">
                <label for="medal-file">Medal File (Optional)</label>
                <input type="file" id="medal-file" name="medal-file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
    </div>
